name: Public Browser

permissions:
  contents: read

concurrency:
  group: public-browser-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  workflow_dispatch:

jobs:
  public-browser:
    if: github.event_name != 'pull_request' || (github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      E2E_EDGE_BASE_URL: http://127.0.0.1:3210
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bunx playwright install chromium

      - name: Build web app
        run: bun run build:web

      - name: Start local web app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output/e2e-browser
          PORT=3210 bun run start:web > output/e2e-browser/public-browser-server.log 2>&1 &
          echo $! > output/e2e-browser/public-browser-server.pid

      - name: Wait for local web app
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3210/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Local web app did not become ready in time" >&2
          exit 1

      - name: Create artifact directory
        run: mkdir -p output/e2e-browser

      - name: Run public browser lane
        shell: bash
        run: |
          set -o pipefail
          bun run test:e2e:public-browser | tee output/e2e-browser/public-browser.log

      - name: Upload public browser log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: public-browser-log
          path: output/e2e-browser/public-browser.log
          if-no-files-found: ignore

      - name: Upload public browser artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: public-browser-artifacts
          path: output/e2e-browser
          if-no-files-found: ignore

      - name: Stop local web app
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f output/e2e-browser/public-browser-server.pid ]; then
            kill "$(cat output/e2e-browser/public-browser-server.pid)" >/dev/null 2>&1 || true
          fi
