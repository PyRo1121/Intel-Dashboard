name: Public Browser

permissions:
  contents: read

concurrency:
  group: public-browser-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  workflow_dispatch:

jobs:
  public-browser:
    if: github.event_name != 'pull_request' || (github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      E2E_CF_ACCESS_CLIENT_ID: ${{ secrets.E2E_CF_ACCESS_CLIENT_ID }}
      E2E_CF_ACCESS_CLIENT_SECRET: ${{ secrets.E2E_CF_ACCESS_CLIENT_SECRET }}
      E2E_EDGE_BASE_URL: https://intel.pyro1121.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Check required public-browser secrets
        id: secrets
        shell: bash
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${E2E_CF_ACCESS_CLIENT_ID}" ] && [ -n "${E2E_CF_ACCESS_CLIENT_SECRET}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Public browser lane skipped: missing required secrets (CLOUDFLARE_API_TOKEN, E2E_CF_ACCESS_CLIENT_ID, E2E_CF_ACCESS_CLIENT_SECRET)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install dependencies
        if: steps.secrets.outputs.enabled == 'true'
        run: bun install --frozen-lockfile

      - name: Install Chromium
        if: steps.secrets.outputs.enabled == 'true'
        run: bunx playwright install chromium

      - name: Allowlist runner IP for public browser checks
        if: steps.secrets.outputs.enabled == 'true'
        run: bun run security:cf:allow-owner-e2e-ip

      - name: Let public allowlist propagate
        if: steps.secrets.outputs.enabled == 'true'
        run: sleep 8

      - name: Create artifact directory
        if: steps.secrets.outputs.enabled == 'true'
        run: mkdir -p output/e2e-browser

      - name: Run public browser lane
        if: steps.secrets.outputs.enabled == 'true'
        shell: bash
        run: |
          set -o pipefail
          bun run test:e2e:public-browser | tee output/e2e-browser/public-browser.log

      - name: Upload public browser log
        if: always() && steps.secrets.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: public-browser-log
          path: output/e2e-browser/public-browser.log
          if-no-files-found: ignore

      - name: Upload public browser artifacts
        if: failure() && steps.secrets.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: public-browser-artifacts
          path: output/e2e-browser
          if-no-files-found: ignore

      - name: Clear runner IP allowlist
        if: always() && steps.secrets.outputs.enabled == 'true'
        continue-on-error: true
        run: bun run security:cf:clear-owner-e2e-ip
