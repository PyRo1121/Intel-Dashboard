name: Owner Admin Browser

permissions:
  contents: read

concurrency:
  group: owner-admin-browser-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  workflow_dispatch:

jobs:
  owner-admin-browser:
    if: (github.event_name != 'pull_request' || (github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]')) && env.E2E_SESSION_COOKIE != '' && env.CLOUDFLARE_API_TOKEN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      E2E_SESSION_COOKIE: ${{ secrets.E2E_SESSION_COOKIE }}
      E2E_CF_ACCESS_CLIENT_ID: ${{ secrets.E2E_CF_ACCESS_CLIENT_ID }}
      E2E_CF_ACCESS_CLIENT_SECRET: ${{ secrets.E2E_CF_ACCESS_CLIENT_SECRET }}
      E2E_EDGE_BASE_URL: https://intel.pyro1121.com
      E2E_REQUIRE_AUTH: "1"
      E2E_STRICT: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bunx playwright install chromium

      - name: Save e2e secrets
        run: bun run e2e:save-secrets

      - name: Check owner/admin live e2e configuration
        run: bun run check:e2e-owner-admin-live

      - name: Allowlist runner IP for owner/admin browser checks
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: bun run security:cf:allow-owner-e2e-ip

      - name: Create artifact directory
        run: mkdir -p output/e2e-browser

      - name: Run owner/admin browser lane
        shell: bash
        run: |
          set -o pipefail
          bun run test:e2e:owner-admin | tee output/e2e-browser/owner-admin-browser.log

      - name: Upload owner/admin browser log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: owner-admin-browser-log
          path: output/e2e-browser/owner-admin-browser.log
          if-no-files-found: ignore

      - name: Upload owner/admin browser artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: owner-admin-browser-artifacts
          path: output/e2e-browser
          if-no-files-found: ignore

      - name: Clear runner IP allowlist
        if: always() && env.CLOUDFLARE_API_TOKEN != ''
        continue-on-error: true
        run: bun run security:cf:clear-owner-e2e-ip
