name = "pyrobot-worker"
main = "src/index.ts"
compatibility_date = "2026-03-08"
compatibility_flags = ["nodejs_compat"]

[[services]]
binding = "INTEL_BACKEND"
service = "intel-dashboard-backend"

# Route ALL requests on intel.pyro1121.com through this Worker
# Worker handles /api/* via DO cache, /auth/* directly, static assets via Pages CDN, pages via backend SSR
[[routes]]
pattern = "intel.pyro1121.com/*"
zone_name = "pyro1121.com"

[durable_objects]
bindings = [
  { name = "INTEL_CACHE", class_name = "IntelCacheDO" },
  { name = "TELEGRAM_SCRAPER", class_name = "TelegramScraperDO" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["IntelCacheDO", "FlashCrashDO"]

[[migrations]]
tag = "v2"
deleted_classes = ["FlashCrashDO"]

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "intel-telegram"

[[r2_buckets]]
binding = "ARCHIVE_BUCKET"
bucket_name = "intel-telegram-archive"

[[kv_namespaces]]
binding = "TELEGRAM_STATE"
id = "cd25b7bb6d14483a94faeecef9b017d6"

[[d1_databases]]
binding = "INTEL_DB"
database_name = "intel-telegram-db"
database_id = "0d064b35-0f3d-46db-badd-5ac8cd098eda"

[[migrations]]
tag = "v3"
new_sqlite_classes = ["TelegramScraperDO"]

[limits]
cpu_ms = 300000
subrequests = 50000

[vars]
SCRAPE_INTERVAL_MS = "10000"
SCRAPE_ROTATION_WINDOW_SECONDS = "30"
HOT_CHANNELS_PER_CYCLE = "96"
SCRAPE_FETCH_TIMEOUT_MS = "8000"
SCRAPE_WORKER_CONCURRENCY = "64"
CHANNEL_BUILD_CONCURRENCY = "48"
TELEGRAM_HOT_CHANNELS = "osirskiy|Oleksandr Syrskyi|conflict,AbuAliExpress|Abu Ali Express|conflict,CIG_telegram|Conflict Intelligence Group|conflict,sepahcybery|Sepah Cybery|cyber,Tsaplienko|Tsaplienko|conflict,farsna|Fars News|conflict,Irna_en|IRNA English|conflict,air_alert_ua|Air Alert UA|alerts,AFUStratCom|AFU Strategic Comms|ua_official,GeneralStaffZSU|UA General Staff|ua_official,kpszsu|UA Air Force Command|ua_official,ukraine_context|Ukraine Context|ua_official,DIUkraine|GUR Defense Intelligence|ua_intel,informnapalm|InformNapalm OSINT|ua_intel,Molfar_global|Molfar OSINT|ua_intel,SBUkr|SBU Security Service|ua_intel,azov_media|Azov Brigade|ua_frontline,DeepStateUA|DeepState Map|ua_osint,operativnoZSU|Operatyvnyi ZSU|ua_osint,Atesh_UA|ATESH Partisan Movement|ua_intel,dva_majors|Two Majors|ru_milblog,boris_rozhin|Colonelcassad|ru_milblog,ASTRApress|ASTRA Independent|ru_milblog,milinfolive|MilInfoLive|ru_milblog,anna_news|ANNA News|ru_milblog,ConflictChronicles|Chronicles of Conflict|ru_milblog,grey_zone|Grey Zone / Wagner|ru_milblog,mig41|MIG Russia|ru_milblog,infantmilitario|Militarist|ru_milblog,abbasdjuma|Abbas Djuma|ru_milblog,medvedev_telegram|Medvedev|ru_official,bomber_fighter|Fighterbomber|ru_milblog"

[assets]
directory = "../web/.output/public"
binding = "ASSETS"
run_worker_first = [
  "/",
  "/login",
  "/signup",
  "/auth/*",
  "/oauth/*",
  "/api/*",
  "/media/*",
  "/media-proxy",
  "/osint*",
  "/my-feed*",
  "/my-alerts*",
  "/telegram*",
  "/map*",
  "/air-sea*",
  "/briefings*",
  "/billing*",
  "/crm*",
  "/polymarket",
  "/drops",
  "/robots.txt",
  "/sitemap.xml",
]

[observability]
enabled = true
head_sampling_rate = 0.05

[observability.logs]
enabled = true
head_sampling_rate = 0.05
invocation_logs = true
persist = true

[observability.traces]
enabled = true
head_sampling_rate = 0.05
persist = true
