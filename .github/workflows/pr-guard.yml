name: PR Guard

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

jobs:
  enforce-pr-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce target branch and branch naming
        uses: actions/github-script@v7
        with:
          script: |
            const baseRef = context.payload.pull_request.base.ref;
            const headRef = context.payload.pull_request.head.ref;
            const allowed = /^(codex|feature|fix|chore|docs|refactor|hotfix)\//;

            if (baseRef !== 'main') {
              core.setFailed(`Pull requests must target main. Received base branch: ${baseRef}`);
              return;
            }

            if (!allowed.test(headRef)) {
              core.setFailed(
                `Branch names must start with codex/, feature/, fix/, chore/, docs/, refactor/, or hotfix/. Received: ${headRef}`,
              );
            }
