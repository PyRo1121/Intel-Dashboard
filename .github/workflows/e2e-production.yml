name: E2E Production

permissions:
  contents: read

concurrency:
  group: e2e-production-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "17 11 * * *"

jobs:
  test-production:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      E2E_SESSION_TOKEN: ${{ secrets.E2E_SESSION_TOKEN }}
      E2E_SIGNOUT_SESSION_TOKEN: ${{ secrets.E2E_SIGNOUT_SESSION_TOKEN }}
      E2E_BACKEND_TOKEN: ${{ secrets.E2E_BACKEND_TOKEN }}
      E2E_USER_ID: ${{ secrets.E2E_USER_ID }}
      E2E_NON_OWNER_USER_ID: ${{ secrets.E2E_NON_OWNER_USER_ID }}
      E2E_EDGE_BASE_URL: https://intel.pyro1121.com
      E2E_BACKEND_BASE_URL: https://backend-e2e.pyro1121.com
      E2E_REQUIRE_AUTH: "1"
      E2E_STRICT: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bunx playwright install chromium

      - name: Save e2e secrets
        run: bun run e2e:save-secrets

      - name: Check live e2e configuration
        run: bun run check:e2e-live

      - name: Allowlist runner IP for auth-route checks
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: bun run security:cf:allow-owner-e2e-ip

      - name: Create artifact directory
        run: mkdir -p output/e2e-browser

      - name: Run full production test gate
        shell: bash
        run: |
          set -o pipefail
          bun run test:all:live | tee output/e2e-browser/test-all.log

      - name: Write e2e summary
        if: always()
        run: node scripts/write-e2e-summary.mjs output/e2e-browser/test-all.log

      - name: Upload test log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-log
          path: output/e2e-browser/test-all.log
          if-no-files-found: ignore

      - name: Upload browser e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-browser-artifacts
          path: output/e2e-browser
          if-no-files-found: ignore

      - name: Clear runner IP allowlist
        if: always() && env.CLOUDFLARE_API_TOKEN != ''
        run: bun run security:cf:clear-owner-e2e-ip
