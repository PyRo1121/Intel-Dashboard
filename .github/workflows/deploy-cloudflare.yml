name: Deploy Cloudflare

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-main
  cancel-in-progress: false

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy-production:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      EDGE_SMOKE_BASE_URL: https://intel.pyro1121.com
      BACKEND_SMOKE_BASE_URL: https://backend-e2e.pyro1121.com
      COLLECTOR_SMOKE_BASE_URL: https://intel-dashboard-telegram-collector.latham.workers.dev
    steps:
      - name: Check deploy credentials
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "Missing CLOUDFLARE_DEPLOY_API_TOKEN (or fallback CLOUDFLARE_API_TOKEN)." >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Guard against stale workflow_run SHA
        id: freshness
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_run" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main --depth=1
          current_main_sha="$(git rev-parse origin/main)"
          triggered_sha="${{ github.event.workflow_run.head_sha }}"

          if [ "$current_main_sha" != "$triggered_sha" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping stale deploy for ${triggered_sha}; current main is ${current_main_sha}." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        if: steps.freshness.outputs.proceed == 'true'
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        if: steps.freshness.outputs.proceed == 'true'
        run: bun install --frozen-lockfile

      - name: Deploy backend
        if: steps.freshness.outputs.proceed == 'true'
        run: bun run deploy:backend

      - name: Backend smoke
        if: steps.freshness.outputs.proceed == 'true'
        run: node scripts/production-smoke-backend.mjs

      - name: Deploy edge
        if: steps.freshness.outputs.proceed == 'true'
        run: bun run deploy:edge

      - name: Edge smoke
        if: steps.freshness.outputs.proceed == 'true'
        run: node scripts/production-smoke-edge.mjs

      - name: Deploy telegram collector
        if: steps.freshness.outputs.proceed == 'true'
        run: bun run --cwd apps/telegram-collector deploy

      - name: Collector smoke
        if: steps.freshness.outputs.proceed == 'true'
        run: node scripts/production-smoke-collector.mjs
